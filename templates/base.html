<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetFusion | {% block title %}IT Hardware & Solutions{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { DEFAULT: '#1A5B9C', dark: '#114070', light: '#E8F1F8' }
                    }
                }
            }
        }
    </script>
    {% block styles %}{% endblock %}
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased relative">

    {% include 'partials/header.html' %}

    <main>
        {% block content %}{% endblock %}
    </main>

    {% include 'partials/footer.html' %}

    <script>
        const btn = document.getElementById('mobile-menu-btn');
        const menu = document.getElementById('mobile-menu');
        if(btn && menu) {
            btn.addEventListener('click', () => {
                menu.classList.toggle('hidden');
            });
        }

        // Detect if device is mobile
        function isMobileDevice() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }

        // Single-click quote button handler
        function requestQuote(button, mailtoLink) {
            // Disable the button to prevent multiple clicks
            button.disabled = true;
            button.style.opacity = '0.6';
            button.style.cursor = 'not-allowed';
            
            // Change button text to indicate quote was sent
            button.textContent = 'Quote Request Sent ✓';
            
            if (isMobileDevice()) {
                // On mobile: use mailto to open default email app (Gmail, Outlook, etc.)
                window.location.href = mailtoLink;
            } else {
                // On desktop: open Gmail web compose
                // Extract email, subject, and body from mailto link
                const mailtoMatch = mailtoLink.match(/mailto:([^\?]+)\?subject=([^&]+)&body=(.+)$/);
                if (mailtoMatch) {
                    const email = mailtoMatch[1];
                    const subject = decodeURIComponent(mailtoMatch[2]);
                    const body = decodeURIComponent(mailtoMatch[3]);
                    
                    // Gmail web compose URL
                    const gmailUrl = `https://mail.google.com/mail/?view=cm&fs=1&to=${email}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
                    window.open(gmailUrl, '_blank');
                } else {
                    // Fallback to mailto
                    window.location.href = mailtoLink;
                }
            }
        }
    </script>
</body>
</html>
