{% extends 'authentication_base.html' %}
{% block title %}Login - NetFusion{% endblock %}

{% block content %}
<section class="py-20 bg-gray-50 flex-grow min-h-screen flex items-center justify-center">
    <div class="bg-white p-10 rounded-xl shadow-lg max-w-md w-full border border-gray-100">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-gray-900">Welcome Back</h2>
            <p class="text-gray-500 mt-2">Log in to your NetFusion account.</p>
        </div>

        {% if error %}
        <div class="bg-red-50 text-red-600 p-3 rounded mb-6 text-sm font-semibold border border-red-200">
            {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Email Address</label>
                <input type="email" name="email" required class="w-full px-4 py-3 rounded border border-gray-300 focus:border-brand focus:ring-2 focus:ring-brand-light outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required class="w-full px-4 py-3 rounded border border-gray-300 focus:border-brand focus:ring-2 focus:ring-brand-light outline-none transition">
            </div>
            <button type="submit" class="w-full bg-brand text-white font-bold py-3 rounded shadow hover:bg-brand-dark transition">
                Log In
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-gray-600">
            Don't have an account? <a href="/signup" class="text-brand font-bold hover:underline">Sign up here</a>.
        </p>
    </div>
</section>
{% endblock %}
